[technology-description]
interplanetary-portal=Unlocks the Interplanetary Portal — a single structure that accepts warp modules to enable travel between planets.
warp-module-nauvis=Unlocks the Nauvis Warp Module. Install it in a portal to enable travel to Nauvis.
warp-module-vulcanus=Unlocks the Vulcanus Warp Module. Install it in a portal to enable travel to Vulcanus.
warp-module-fulgora=Unlocks the Fulgora Warp Module. Install it in a portal to enable travel to Fulgora.
warp-module-gleba=Unlocks the Gleba Warp Module. Install it in a portal to enable travel to Gleba.
warp-module-aquilo=Unlocks the Aquilo Warp Module. Install it in a portal to enable travel to Aquilo.
warp-module-cargo=Unlocks the Cargo Warp Module — a capstone that lets travellers carry their inventory through the portal. Requires every planet warp module to research, and one of each to craft.
